<!DOCTYPE html>
<html>
<head>
<title>Option AI Trading Tool</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.box {
  border: 1px solid #444;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
  background: #1e293b;
}

.buy { color: #22c55e; font-size: 24px; }
.sell { color: #ef4444; font-size: 24px; }

button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🚀 Option AI Trading Tool</h1>

<button onclick="generateSignal()">Get Live Signal</button>

<div class="box">
  <h2 id="price">Price: --</h2>
  <h2 id="trend">Trend: --</h2>
  <h2 id="signal">Signal: --</h2>
  <p id="entry"></p>
  <p id="sl"></p>
  <p id="target"></p>
</div>

<!-- LIVE MARKET -->
<div style="background:black; padding:10px;">
<h3>Live Market</h3>
<p id="nifty">Loading NIFTY...</p>
<p id="banknifty">Loading BANKNIFTY...</p>
</div>

<script>

// 🔥 Live Market Data
async function getData(){
  let res = await fetch("https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5ENSEI,%5ENSEBANK");
  let data = await res.json();

  let nifty = data.quoteResponse.result[0].regularMarketPrice;
  let bank = data.quoteResponse.result[1].regularMarketPrice;

  document.getElementById("nifty").innerHTML = "NIFTY: " + nifty;
  document.getElementById("banknifty").innerHTML = "BANKNIFTY: " + bank;
}

// 🔥 AI Signal (Real Logic)
async function generateSignal() {

  let res = await fetch("https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5ENSEI");
  let data = await res.json();

  let price = data.quoteResponse.result[0].regularMarketPrice;

  let trend, signal, entry, sl, target;

  // 🔥 Improved Logic (Range + Breakout feel)
  if (price > 22250) {
    trend = "UPTREND";
    signal = "BUY";
    entry = price;
    sl = price - 50;
    target = price + 120;
  } 
  else if (price < 22150) {
    trend = "DOWNTREND";
    signal = "SELL";
    entry = price;
    sl = price + 50;
    target = price - 120;
  } 
  else {
    trend = "SIDEWAYS";
    signal = "WAIT";
  }

  document.getElementById("price").innerText = "Price: " + price;
  document.getElementById("trend").innerText = "Trend: " + trend;

  let signalElement = document.getElementById("signal");
  signalElement.innerText = "Signal: " + signal;
  signalElement.className = signal === "BUY" ? "buy" : signal === "SELL" ? "sell" : "";

  document.getElementById("entry").innerText = entry ? "Entry: " + entry : "";
  document.getElementById("sl").innerText = sl ? "SL: " + sl : "";
  document.getElementById("target").innerText = target ? "Target: " + target : "";
}

// Auto refresh
setInterval(getData, 5000);
getData();

</script>
